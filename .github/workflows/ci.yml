name: CI

on:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - tree-sitter.json
  pull_request:
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - tree-sitter.json
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true


jobs:
  lint:
    name: Lint grammar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for grammar changes
        id: grammar-check
        run: |-
          if git diff --quiet HEAD^ -- grammar.cjs; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'changed=true\n' >> "$GITHUB_OUTPUT"
          fi
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        if: steps.grammar-check.outputs.changed == 'true'
      - name: Regenerate parser
        shell: bash
        run: |
          while read -r grammar_dir; do
            grammar_dir="${grammar_dir%$'\r'}"
            pushd "$grammar_dir"
            tree-sitter generate
            popd > /dev/null
          done < <(jq -r '.grammars[].path // "."' tree-sitter.json)
        if: steps.grammar-check.outputs.changed == 'true'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: '22'
        if: steps.grammar-check.outputs.changed == 'true'
      - name: Install modules
        run: npm i
        if: steps.grammar-check.outputs.changed == 'true'
      - name: Run ESLint
        run: npm run lint
        if: steps.grammar-check.outputs.changed == 'true'

  test:
    name: Test parser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run parser and binding tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-node: true
          test-python: true
          node-version: '22'
      - name: Parse example files
        uses: tree-sitter/parse-action@v4
        id: parse-files
        with:
          files: |
            examples/**/*.org
            *.org
      - name: Upload parse failures
        uses: actions/upload-artifact@v4
        if: "!cancelled() && steps.parse-files.outcome == 'failure'"
        with:
          name: failures
          path: ${{steps.parse-files.outputs.failures}}

  fuzz:
    name: Fuzz scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for scanner changes
        id: scanner-check
        run: |-
          if git diff --quiet HEAD^ -- src/scanner.c; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'changed=true\n' >> "$GITHUB_OUTPUT"
          fi
      - name: Run the fuzzer
        uses: tree-sitter/fuzz-action@v4
        if: steps.scanner-check.outputs.changed == 'true'
