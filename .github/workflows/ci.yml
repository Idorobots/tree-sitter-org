name: CI

on:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - tree-sitter.json
  pull_request:
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - tree-sitter.json
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true


jobs:
  lint:
    name: Lint grammar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Regenerate parser
        shell: bash
        run: |
          while read -r grammar_dir; do
            grammar_dir="${grammar_dir%$'\r'}"
            pushd "$grammar_dir"
            tree-sitter generate
            popd > /dev/null
          done < <(jq -r '.grammars[].path // "."' tree-sitter.json)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: '22'
      - name: Install modules
        run: npm i
      - name: Run ESLint
        run: npm run lint

  test:
    name: Test parser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run parser and binding tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-node: true
          test-python: true
          node-version: '22'
      - name: Parse example files
        uses: tree-sitter/parse-action@v4
        id: parse-files
        with:
          files: |
            examples/**/*.org
            *.org
      - name: Upload parse failures
        uses: actions/upload-artifact@v4
        if: "!cancelled() && steps.parse-files.outcome == 'failure'"
        with:
          name: failures
          path: ${{steps.parse-files.outputs.failures}}

  fuzz:
    name: Fuzz scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Regenerate parser
        shell: bash
        run: |
          while read -r grammar_dir; do
            grammar_dir="${grammar_dir%$'\r'}"
            pushd "$grammar_dir"
            tree-sitter generate
            popd > /dev/null
          done < <(jq -r '.grammars[].path // "."' tree-sitter.json)
      - name: Run the fuzzer
        uses: tree-sitter/fuzz-action@v4
